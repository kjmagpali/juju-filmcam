<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Disposable Camera</title>
  <style>
    :root {
      --brand-red: #3D0C0C;
      --brand-cream: #FDFDD0;
      --orange-stamp: #ff5500;
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      text-align: center;
      background-color: var(--brand-red);
      color: var(--brand-cream);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 100vh;
      overflow: hidden;
    }

    .app-container {
      width: 100%;
      max-width: 450px;
      height: 100%;
      padding: 20px 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    header {
      margin-top: 5px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Branded stylized Character Icon Render (Inline SVG) */
    .character-logo {
      width: 70px;
      height: 70px;
      margin-bottom: 5px;
    }

    h1 {
      font-size: 1.5rem;
      letter-spacing: 2px;
      color: var(--brand-cream);
      margin: 0 0 5px 0;
      text-transform: uppercase;
      font-weight: 900;
    }

    .subtitle {
      font-size: 0.75rem;
      color: rgba(253, 253, 208, 0.6);
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Elegant arch-shaped framing inspired by your menu cards */
    .viewfinder-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      background-color: #050505;
      border: 6px solid var(--brand-cream);
      border-radius: 140px 140px 16px 16px; /* Perfect top arch design */
      overflow: hidden;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.9), 0 8px 25px rgba(0,0,0,0.6);
    }

    #viewfinder {
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* Simulated Kodak Portra 400 Real-Time Color Grade Profile */
      filter: sepia(0.25) contrast(1.15) brightness(1.0) saturate(1.25) hue-rotate(-5deg);
      transition: filter 0.1s ease;
    }

    .viewfinder-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
    }

    /* Subtle Film Grain Layer Overlay */
    .grain-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MDAiIGhlaWdodD0iNDAwIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC44NSIgbnVtT2N0YXZlcz0iMyIgc3RpdGNoVGlsZXM9InN0aXRjaCIvPjwvY3ZnPg==');
      opacity: 0.12;
      pointer-events: none;
    }

    /* Analog Portra-Style Date Stamp */
    .date-stamp {
      position: absolute;
      bottom: 20px;
      right: 25px;
      color: var(--orange-stamp);
      font-weight: bold;
      font-size: 1.1rem;
      letter-spacing: 3px;
      text-shadow: 0 0 3px rgba(255, 85, 0, 0.7);
      font-family: 'Courier New', monospace;
    }

    .control-panel {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 15px;
    }

    .counter-display {
      background: rgba(253, 253, 208, 0.1);
      padding: 6px 18px;
      border-radius: 20px;
      border: 1px solid rgba(253, 253, 208, 0.2);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .counter-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: rgba(253, 253, 208, 0.6);
      letter-spacing: 1px;
    }

    .counter-value {
      font-size: 1.6rem;
      color: var(--brand-cream);
      font-weight: bold;
    }

    /* Analog Cream Shutter Button Layout */
    .shutter-wrapper {
      position: relative;
      width: 85px;
      height: 85px;
    }

    .btn-shutter {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff 0%, var(--brand-cream) 100%);
      border: 6px solid #e2dfb3;
      box-shadow: 0 6px 16px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.4);
      cursor: pointer;
    }

    .btn-shutter:active {
      transform: scale(0.95);
      box-shadow: 0 2px 5px rgba(0,0,0,0.7), inset 0 2px 4px rgba(0,0,0,0.3);
      background: radial-gradient(circle, var(--brand-cream) 0%, #d4cf9e 100%);
    }

    .btn-shutter:disabled {
      background: #5a1c1c !important;
      border-color: #3d0c0c;
      box-shadow: none;
      cursor: not-allowed;
    }

    .shutter-ring {
      position: absolute;
      top: -5px; left: -5px;
      width: calc(100% + 10px);
      height: calc(100% + 10px);
      border-radius: 50%;
      border: 2px dashed rgba(253, 253, 208, 0.4);
      pointer-events: none;
    }

    #status-msg {
      font-size: 0.8rem;
      color: rgba(253, 253, 208, 0.7);
      height: 20px;
      margin: 4px 0 0 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Shutter Flash Animation */
    .flash-active {
      animation: cameraFlash 0.35s ease-out;
    }

    @keyframes cameraFlash {
      0% { filter: brightness(1) contrast(1.15); opacity: 1; }
      25% { filter: brightness(20) contrast(0.2); opacity: 0.2; }
      100% { filter: brightness(1) contrast(1.15); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <header>
      <!-- Stylized vector character matching menu_print icon -->
      <svg class="character-logo" viewBox="0 0 100 100" fill="none" xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)">
        <circle cx="50" cy="50" r="45" fill="#3D0C0C" stroke="#FDFDD0" stroke-width="3"/>
        <!-- Stylized Ears -->
        <path d="M12 40 C5 40 5 60 12 60 Z" fill="#FDFDD0" stroke="#3D0C0C" stroke-width="2"/>
        <path d="M88 40 C95 40 95 60 88 60 Z" fill="#FDFDD0" stroke="#3D0C0C" stroke-width="2"/>
        <!-- Spiky Hair Outlines -->
        <path d="M20 40 L30 18 L42 28 L50 12 L58 28 L70 18 L80 40 L74 48 L65 42 L50 48 L35 42 L26 48 Z" fill="#FDFDD0"/>
        <!-- Face Structure -->
        <path d="M22 40 C22 65 35 78 50 78 C65 78 78 65 78 40" fill="#FDFDD0"/>
        <!-- Spiky Hair Bangs -->
        <path d="M22 40 L34 44 L38 32 L46 45 L50 35 L54 45 L62 32 L66 44 L78 40" stroke="#3D0C0C" stroke-width="3" stroke-linecap="round"/>
        <!-- Stylized Cheek Scars/Stars -->
        <path d="M28 55 L32 55 M30 53 L30 57" stroke="#3D0C0C" stroke-width="2" stroke-linecap="round"/>
        <path d="M72 55 L68 55 M70 53 L70 57" stroke="#3D0C0C" stroke-width="2" stroke-linecap="round"/>
        <!-- Determination Eyes -->
        <path d="M30 48 Q38 46 42 50" stroke="#3D0C0C" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M70 48 Q62 46 58 50" stroke="#3D0C0C" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Sharp pupils -->
        <circle cx="37" cy="51" r="2.5" fill="#3D0C0C"/>
        <circle cx="63" cy="51" r="2.5" fill="#3D0C0C"/>
        <!-- Smirk -->
        <path d="M43 62 Q50 64 57 60" stroke="#3D0C0C" stroke-width="3" fill="none" stroke-linecap="round"/>
      </svg>
      <h1>Disposable</h1>
      <p class="subtitle">Portra 400 Film</p>
    </header>

    <!-- Camera Viewfinder -->
    <div class="viewfinder-wrapper">
      <video id="viewfinder" autoplay playsinline muted></video>
      <div class="viewfinder-overlay">
        <div class="grain-layer"></div>
        <div class="date-stamp" id="dateStamp">99 12 31</div>
      </div>
    </div>

    <canvas id="captureCanvas" style="display:none;"></canvas>

    <!-- Interface Dashboard -->
    <div class="control-panel">
      <div class="counter-display">
        <span class="counter-label">Roll Shots Left:</span>
        <span class="counter-value" id="counterDisplay">20</span>
      </div>

      <div class="shutter-wrapper">
        <button class="btn-shutter" id="snapBtn" aria-label="Shutter Snap Button"></button>
        <div class="shutter-ring"></div>
      </div>
      
      <p id="status-msg">Loading film roll...</p>
    </div>
  </div>

  <script>
    const MAX_SHOTS = 20;
    
    // 1. REPLACE THIS URL WITH YOUR API DEPLOYMENT URL FROM PHASE 2
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxHE4NAhz0A5Yc4KXih0XrGmxxF_2YaKdzFuaOC4Azt-FFoeWTVmMuDbqds9-Xi_utjcQ/exec"; 

    let deviceId = localStorage.getItem('camera_device_uuid');
    if (!deviceId) {
      // Create permanent unique client signature
      deviceId = 'device_' + Math.random().toString(36).substring(2, 15) + Date.now().toString(36);
      localStorage.setItem('camera_device_uuid', deviceId);
    }

    let shotsTaken = 0;
    let localStream = null;

    const video = document.getElementById('viewfinder');
    const canvas = document.getElementById('captureCanvas');
    const context = canvas.getContext('2d');
    const counterDisplay = document.getElementById('counterDisplay');
    const snapBtn = document.getElementById('snapBtn');
    const statusMsg = document.getElementById('status-msg');

    // Analog Kodak Style Stamp Formatting
    function setAnalogDate() {
      const today = new Date();
      const yy = String(today.getFullYear()).slice(-2);
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      dateStamp.innerText = `'${yy} ${mm} ${dd}`;
    }
    setAnalogDate();

    // 1. SILENT SYNC ON RUNTIME
    async function syncRollStatus() {
      try {
        const response = await fetch(`${GAS_URL}?deviceId=${deviceId}`);
        const text = await response.text();
        shotsTaken = parseInt(text) || 0;
        
        updateUI();
        if (shotsTaken < MAX_SHOTS) {
          startCamera();
        }
      } catch (err) {
        console.error(err);
        statusMsg.innerText = "Sync failure. Re-scanning.";
      }
    }

    function updateUI() {
      const remaining = MAX_SHOTS - shotsTaken;
      counterDisplay.innerText = remaining;
      
      if (remaining <= 0) {
        snapBtn.disabled = true;
        statusMsg.innerText = "ROLL FINISHED! DEVELOPING TOMORROW.";
        if (localStream) {
          localStream.getTracks().forEach(track => track.stop());
        }
      } else {
        snapBtn.disabled = false;
        statusMsg.innerText = "READY TO CAPTURE";
      }
    }

    async function startCamera() {
      try {
        if (localStream) {
          localStream.getTracks().forEach(track => track.stop());
        }
        
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "environment" }, 
          audio: false 
        });
        
        localStream = stream;
        video.srcObject = stream;
      } catch (err) {
        console.error(err);
        statusMsg.innerText = "CAMERA ACCESS DENIED!";
        snapBtn.disabled = true;
      }
    }

    // 2. CAPTURING DUAL SAVED FILE FRAMES
    snapBtn.addEventListener('click', () => {
      if (shotsTaken >= MAX_SHOTS) return;

      // Trigger structural analog screen flash
      video.classList.remove('flash-active');
      void video.offsetWidth; 
      video.classList.add('flash-active');

      statusMsg.innerText = "WINDING FILM...";
      snapBtn.disabled = true;

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      // --- CAPTURE 1: RAW NEGATIVE (Unfiltered, high quality) ---
      context.filter = "none";
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      const rawImageDataUrl = canvas.toDataURL('image/jpeg', 0.95);
      const rawBase64 = rawImageDataUrl.split(',')[1];

      // --- CAPTURE 2: PORTRA 400 PRINT (Kodak color profile) ---
      context.filter = "sepia(0.25) contrast(1.15) brightness(1.0) saturate(1.25) hue-rotate(-5deg)";
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      
      // Print date stamp on Kodak image
      context.filter = "none";
      context.fillStyle = "#ff5500";
      context.font = `bold ${Math.max(28, canvas.width * 0.045)}px Courier New, monospace`;
      const stampText = dateStamp.innerText;
      context.fillText(stampText, canvas.width - (canvas.width * 0.28), canvas.height - (canvas.height * 0.05));

      const filteredImageDataUrl = canvas.toDataURL('image/jpeg', 0.82);
      const filteredBase64 = filteredImageDataUrl.split(',')[1];

      // Send to Drive (Stores filtered as print, unfiltered as raw negative)
      fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          filteredImage: filteredBase64,
          rawImage: rawBase64,
          deviceId: deviceId
        })
      }).then(() => {
        shotsTaken++;
        updateUI();
      }).catch(err => {
        console.error(err);
        statusMsg.innerText = "UPLOADER TIMED OUT. TRY AGAIN.";
        snapBtn.disabled = false;
      });
    });

    // Boot up
    syncRollStatus();
  </script>
</body>
</html>

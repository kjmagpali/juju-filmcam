<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mechanical Camera UI</title>
  <style>
    :root {
      --brand-red: #3D0C0C;
      --brand-cream: #FDFDD0;
      --metallic-rim: #e2dfb3;
      --status-green: #39FF14;
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      text-align: center;
      background-color: var(--brand-red);
      color: var(--brand-cream);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 100vh;
      height: 100dvh; /* Safeguards mobile address/navigation bar overlaps */
      overflow: hidden;
    }

    .app-container {
      width: 100%;
      max-width: 450px;
      height: 100%;
      padding: 15px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    /* Tactile Analog Details */
    .top-dial-section {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 10px;
      border-bottom: 2px dashed rgba(253, 253, 208, 0.2);
      margin-bottom: 5px;
    }

    .analog-meter {
      font-size: 0.75rem;
      letter-spacing: 1px;
      color: var(--brand-cream);
      text-transform: uppercase;
      font-weight: bold;
    }

    /* Viewfinder: True 2:3 Portrait Crop with elegant thin outline */
    .viewfinder-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 2/3; /* Standard analog SLR portrait framing ratio */
      background-color: #020202;
      border: 2px solid var(--brand-cream); /* Thinner elegant cream border */
      border-radius: 4px;
      overflow: hidden;
      box-shadow: inset 0 0 40px rgba(0,0,0,1), 0 8px 30px rgba(0,0,0,0.7);
    }

    #viewfinder {
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* CSS real-time preview simulation of Kodak Portra 400 */
      filter: sepia(0.22) contrast(1.18) saturate(1.22) hue-rotate(-6deg) brightness(1.02);
      transition: filter 0.1s ease;
    }

    /* Screen Hardware Flash Simulation */
    #flashOverlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
    }

    .viewfinder-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 15px;
    }

    /* SLR Camera Center Focus Bracket */
    .viewfinder-reticle {
      position: absolute;
      top: 50%; left: 50%;
      width: 40px; height: 40px;
      border: 1px dashed var(--brand-cream);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.5;
    }

    .viewfinder-reticle::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 6px; height: 6px;
      background-color: var(--brand-cream);
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    .grain-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC45MCIgbnVtT2N0YXZlcz0iMiIgc3RpdGNoVGlsZXM9InN0aXRjaCIvPjwvY3ZnPg==');
      opacity: 0.12;
      pointer-events: none;
    }

    /* Camera control panel at bottom */
    .control-panel {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      margin-bottom: 10px;
    }

    .dashboard-row {
      width: 100%;
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .counter-display {
      background: rgba(253, 253, 208, 0.1);
      padding: 8px 16px;
      border-radius: 4px;
      border: 1px solid var(--brand-cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 90px;
    }

    .counter-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      color: rgba(253, 253, 208, 0.6);
      letter-spacing: 1px;
      margin-bottom: 2px;
    }

    .counter-value {
      font-size: 1.5rem;
      color: var(--brand-cream);
      font-weight: bold;
    }

    /* Mechanical Shutter Trigger Base */
    .shutter-wrapper {
      position: relative;
      width: 85px;
      height: 85px;
    }

    .btn-shutter {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff 0%, var(--brand-cream) 100%);
      border: 6px solid var(--metallic-rim);
      box-shadow: 0 6px 16px rgba(0,0,0,0.6), inset 0 2px 4px rgba(255,255,255,0.4);
      cursor: pointer;
    }

    .btn-shutter:active {
      transform: scale(0.94);
      box-shadow: 0 2px 6px rgba(0,0,0,0.8), inset 0 2px 4px rgba(0,0,0,0.3);
      background: radial-gradient(circle, var(--brand-cream) 0%, #dcd7a5 100%);
    }

    .btn-shutter:disabled {
      background: #5a1c1c !important;
      border-color: #3d0c0c;
      box-shadow: none;
      cursor: not-allowed;
    }

    .shutter-ring {
      position: absolute;
      top: -5px; left: -5px;
      width: calc(100% + 10px);
      height: calc(100% + 10px);
      border-radius: 50%;
      border: 2px dashed rgba(253, 253, 208, 0.4);
      pointer-events: none;
    }

    /* Flip Camera Toggle Button */
    .btn-camera-flip {
      background: var(--brand-cream);
      color: var(--brand-red);
      border: 1px solid var(--brand-cream);
      border-radius: 50%;
      width: 45px;
      height: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }

    .btn-camera-flip:active {
      transform: scale(0.9);
      background-color: #e2dfb3;
    }

    .flip-icon {
      width: 24px;
      height: 24px;
      fill: var(--brand-red);
    }

    #status-msg {
      font-size: 0.75rem;
      color: var(--brand-cream);
      height: 18px;
      margin: 2px 0 0 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Simulated Screen Flash Animation */
    .flash-triggered {
      animation: hardwareFlashEffect 0.22s ease-out;
    }

    @keyframes hardwareFlashEffect {
      0% { opacity: 0; }
      20% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="top-dial-section">
      <span class="analog-meter">BATT: 100%</span>
      <span class="analog-meter" style="color: var(--status-green);">• ONLINE</span>
    </div>

    <!-- Camera Viewfinder -->
    <div class="viewfinder-wrapper">
      <video id="viewfinder" autoplay playsinline muted></video>
      <div id="flashOverlay"></div>
      <div class="viewfinder-overlay">
        <div class="grain-layer"></div>
        <div class="viewfinder-reticle"></div>
      </div>
    </div>

    <canvas id="captureCanvas" style="display:none;"></canvas>

    <!-- Bottom Mechanical Panel Layout -->
    <div class="control-panel">
      <div class="dashboard-row">
        <!-- Index Counter Display -->
        <div class="counter-display">
          <span class="counter-label">INDEX</span>
          <span class="counter-value" id="counterDisplay">20</span>
        </div>

        <!-- Shutter Capture Trigger -->
        <div class="shutter-wrapper">
          <button class="btn-shutter" id="snapBtn" aria-label="Mechanical Shutter Button"></button>
          <div class="shutter-ring"></div>
        </div>

        <!-- Flip Camera Button (Front/Rear Loop) -->
        <button class="btn-camera-flip" id="flipCamBtn" aria-label="Flip Camera Lens">
          <svg class="flip-icon" viewBox="0 0 24 24" xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)">
            <path d="M19 8l-4 4h3c0 3.31-2.69 6-6 6-1.01 0-1.97-.25-2.8-.7l-1.46 1.46C8.97 19.54 10.43 20 12 20c4.42 0 8-3.58 8-8h3l-4-4zM6 12c0-3.31 2.69-6 6-6 1.01 0 1.97.25 2.8.7l1.46-1.46C15.03 4.46 13.57 4 12 4c-4.42 0-8 3.58-8 8H1l4 4 4-4H6z"/>
          </svg>
        </button>
      </div>
      
      <p id="status-msg">LOADING CAMERA SYSTEM...</p>
    </div>
  </div>

  <script>
    const MAX_SHOTS = 20;
    
    // REPLACE THIS URL WITH YOUR API DEPLOYMENT URL FROM PHASE 2
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxHE4NAhz0A5Yc4KXih0XrGmxxF_2YaKdzFuaOC4Azt-FFoeWTVmMuDbqds9-Xi_utjcQ/exec"; 

    let deviceId = localStorage.getItem('camera_device_uuid');
    if (!deviceId) {
      deviceId = 'device_' + Math.random().toString(36).substring(2, 15) + Date.now().toString(36);
      localStorage.setItem('camera_device_uuid', deviceId);
    }

    let shotsTaken = 0;
    let localStream = null;
    let currentFacingMode = "environment"; // Starts with Rear/Main Camera
    const uploadQueue = [];
    let isUploading = false;

    const video = document.getElementById('viewfinder');
    const canvas = document.getElementById('captureCanvas');
    const context = canvas.getContext('2d');
    const counterDisplay = document.getElementById('counterDisplay');
    const snapBtn = document.getElementById('snapBtn');
    const flipCamBtn = document.getElementById('flipCamBtn');
    const statusMsg = document.getElementById('status-msg');
    const flashOverlay = document.getElementById('flashOverlay');

    // 1. SYSTEM INITIALIZATION & DISK SYNC
    async function syncRollStatus() {
      try {
        const response = await fetch(`${GAS_URL}?deviceId=${deviceId}`);
        const text = await response.text();
        shotsTaken = parseInt(text) || 0;
        
        updateUI();
        if (shotsTaken < MAX_SHOTS) {
          await startCamera();
        }
      } catch (err) {
        console.error(err);
        statusMsg.innerText = "OFFLINE - SHUTTER ACTIVE";
        await startCamera(); // Allow offline fallback shooting
      }
    }

    function updateUI() {
      const remaining = MAX_SHOTS - shotsTaken;
      counterDisplay.innerText = remaining;
      
      if (remaining <= 0) {
        snapBtn.disabled = true;
        statusMsg.innerText = "ROLL EMPTY. MECHANICS LOCKED.";
        if (localStream) {
          localStream.getTracks().forEach(track => track.stop());
        }
      } else {
        snapBtn.disabled = false;
        statusMsg.innerText = "READY";
      }
    }

    // 2. HARDENED UNIVERSAL FRONT/BACK CAMERA TRIGGER
    async function startCamera() {
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
      }

      const constraints = {
        video: {
          facingMode: currentFacingMode,
          // Request maximum resolution capabilities of physical sensor (4K/HD)
          width: { ideal: 4096 },
          height: { ideal: 2160 }
        },
        audio: false
      };

      try {
        localStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = localStream;
        statusMsg.innerText = currentFacingMode === "environment" ? "MAIN BACK LENS" : "PORTRAIT FRONT LENS";
      } catch (err) {
        console.warn("High-res constraints rejected, falling back to standard resolution...", err);
        try {
          // Standard HD capture fallback
          localStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: currentFacingMode },
            audio: false
          });
          video.srcObject = localStream;
          statusMsg.innerText = currentFacingMode === "environment" ? "BACK LENS (SD)" : "FRONT LENS (SD)";
        } catch (e) {
          console.error("Camera system completely rejected:", e);
          statusMsg.innerText = "LENS ACQUISITION FAILURE";
        }
      }
    }

    // Toggle facing modes explicitly
    flipCamBtn.addEventListener('click', async () => {
      currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
      statusMsg.innerText = "SWAPPING GLASS...";
      await startCamera();
    });

    // 3. HARDWARE LED FLASH MANAGEMENT
    async function setHardwareTorch(on) {
      if (!localStream) return;
      const track = localStream.getVideoTracks()[0];
      if (track && typeof track.getCapabilities === 'function') {
        try {
          const caps = track.getCapabilities();
          if (caps.torch) {
            await track.applyConstraints({
              advanced: [{ torch: on }]
            });
          }
        } catch (e) {
          console.warn("Hardware LED flash controls unsupported by this system lens configuration.", e);
        }
      }
    }

    // 4. INSTANT SHUTTER SNAP & LOSSLESS DUAL-LAYER PROCESSING
    snapBtn.addEventListener('click', async () => {
      if (shotsTaken >= MAX_SHOTS) return;

      // Lock buttons momentarily to prevent quick double snaps (100ms cycle delay)
      snapBtn.disabled = true;

      // Decrement remaining counter instantly in UI
      shotsTaken++;
      updateUI();

      // Trigger structural white screen flash overlay (Visual feedback)
      flashOverlay.classList.remove('flash-triggered');
      void flashOverlay.offsetWidth;
      flashOverlay.classList.add('flash-triggered');

      // Force physical LED flash active
      await setHardwareTorch(true);

      // Match canvas size to native incoming camera stream parameters
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      // --- CAPTURE 1: LOSSLESS RAW NEGATIVE PNG ---
      context.filter = "none";
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      const rawImageDataUrl = canvas.toDataURL('image/png'); // Full Lossless PNG capture
      const rawBase64 = rawImageDataUrl.split(',')[1];

      // --- CAPTURE 2: LOSSLESS DEVELOPED PRINT (BAKED PORTRA 400 EMULATION) ---
      // Draw base frame
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      
      // Multi-browser backup layer filter drawing to guarantee Portra 400 look in GDrive
      // Layer A: Golden warm soft highlights
      context.globalCompositeOperation = 'soft-light';
      context.fillStyle = 'rgba(255, 140, 0, 0.22)'; 
      context.fillRect(0, 0, canvas.width, canvas.height);

      // Layer B: Subtle sepia wash
      context.globalCompositeOperation = 'color';
      context.fillStyle = 'rgba(112, 66, 20, 0.12)'; 
      context.fillRect(0, 0, canvas.width, canvas.height);

      // Reset composite operation to normal
      context.globalCompositeOperation = 'source-over';

      const filteredImageDataUrl = canvas.toDataURL('image/png'); // Full Lossless PNG print
      const filteredBase64 = filteredImageDataUrl.split(',')[1];

      // De-active LED flash
      setTimeout(async () => {
        await setHardwareTorch(false);
      }, 80);

      // Release mechanical shutter block for back-to-back rapid shooting
      setTimeout(() => {
        if (shotsTaken < MAX_SHOTS) {
          snapBtn.disabled = false;
          statusMsg.innerText = "READY";
        }
      }, 100);

      // Push raw and filtered PNG packets into background uploader queue
      uploadQueue.push({
        filteredImage: filteredBase64,
        rawImage: rawBase64,
        deviceId: deviceId
      });

      // Fire upload processing loop
      processUploadQueue();
    });

    // 5. ASYNC BACKGROUND NON-BLOCKING UPLOAD QUEUE
    function processUploadQueue() {
      if (isUploading || uploadQueue.length === 0) return;
      isUploading = true;

      const currentTask = uploadQueue[0];
      const itemsPending = uploadQueue.length;
      statusMsg.innerText = `DEVELOPING SHOT... (${itemsPending} QUEUED)`;

      fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(currentTask)
      }).then(() => {
        uploadQueue.shift();
        isUploading = false;
        
        if (uploadQueue.length === 0) {
          statusMsg.innerText = shotsTaken >= MAX_SHOTS ? "ROLL EMPTY. SHUTTER LOCKED." : "READY";
        } else {
          processUploadQueue();
        }
      }).catch(err => {
        console.error("Network upload drop, retrying background thread in 3s...", err);
        isUploading = false;
        statusMsg.innerText = "CONNECTION DROP. RETRYING...";
        setTimeout(processUploadQueue, 3000); // Retry loop
      });
    }

    // Boot camera sequence
    syncRollStatus();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mechanical Camera UI</title>
  <style>
    :root {
      --brand-red: #3D0C0C;
      --brand-cream: #FDFDD0;
      --metallic-rim: #e2dfb3;
      --status-green: #39FF14;
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      text-align: center;
      background-color: var(--brand-red);
      color: var(--brand-cream);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 100vh;
      height: 100dvh; /* Safeguards Safari/Chrome toolbar height */
      overflow: hidden;
    }

    .app-container {
      width: 100%;
      max-width: 450px;
      height: 100%;
      padding: 15px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    /* Tactile Analog Details */
    .top-dial-section {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 10px;
      border-bottom: 2px dashed rgba(253, 253, 208, 0.2);
      margin-bottom: 5px;
    }

    .analog-meter {
      font-size: 0.75rem;
      letter-spacing: 1px;
      color: var(--brand-cream);
      text-transform: uppercase;
      font-weight: bold;
    }

    /* Viewfinder: True 2:3 Portrait Crop */
    .viewfinder-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 2/3; /* Standard SLR portrait framing ratio */
      background-color: #020202;
      border: 8px solid var(--brand-cream);
      border-radius: 4px; /* Crisp mechanical square-edge framing */
      overflow: hidden;
      box-shadow: inset 0 0 40px rgba(0,0,0,1), 0 8px 30px rgba(0,0,0,0.7);
    }

    #viewfinder {
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* Simulated Portra 400 Film Filter: Warm tones, soft greens, saturated golds */
      filter: sepia(0.25) contrast(1.15) saturate(1.22) hue-rotate(-6deg) brightness(1.02);
      transition: filter 0.1s ease;
    }

    /* Screen Flash Overlay */
    #flashOverlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
    }

    .viewfinder-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 15px;
    }

    /* SLR Camera Focus Reticle */
    .viewfinder-reticle {
      position: absolute;
      top: 50%; left: 50%;
      width: 40px; height: 40px;
      border: 1px dashed var(--brand-cream);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.5;
    }

    .viewfinder-reticle::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 6px; height: 6px;
      background-color: var(--brand-cream);
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    .grain-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC45MCIgbnVtT2N0YXZlcz0iMiIgc3RpdGNoVGlsZXM9InN0aXRjaCIvPjwvY3ZnPg==');
      opacity: 0.15;
      pointer-events: none;
    }

    /* Camera control panel at bottom */
    .control-panel {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      margin-bottom: 10px;
    }

    .dashboard-row {
      width: 100%;
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .counter-display {
      background: rgba(253, 253, 208, 0.1);
      padding: 8px 16px;
      border-radius: 4px;
      border: 1px solid var(--brand-cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 90px;
    }

    .counter-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      color: rgba(253, 253, 208, 0.6);
      letter-spacing: 1px;
      margin-bottom: 2px;
    }

    .counter-value {
      font-size: 1.5rem;
      color: var(--brand-cream);
      font-weight: bold;
    }

    /* Shutter Button Setup */
    .shutter-wrapper {
      position: relative;
      width: 85px;
      height: 85px;
    }

    .btn-shutter {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff 0%, var(--brand-cream) 100%);
      border: 6px solid var(--metallic-rim);
      box-shadow: 0 6px 16px rgba(0,0,0,0.6), inset 0 2px 4px rgba(255,255,255,0.4);
      cursor: pointer;
    }

    .btn-shutter:active {
      transform: scale(0.94);
      box-shadow: 0 2px 6px rgba(0,0,0,0.8), inset 0 2px 4px rgba(0,0,0,0.3);
      background: radial-gradient(circle, var(--brand-cream) 0%, #dcd7a5 100%);
    }

    .btn-shutter:disabled {
      background: #5a1c1c !important;
      border-color: #3d0c0c;
      box-shadow: none;
      cursor: not-allowed;
    }

    .shutter-ring {
      position: absolute;
      top: -5px; left: -5px;
      width: calc(100% + 10px);
      height: calc(100% + 10px);
      border-radius: 50%;
      border: 2px dashed rgba(253, 253, 208, 0.4);
      pointer-events: none;
    }

    /* Cycle Lens Tactile Button */
    .btn-lens-cycle {
      background: var(--brand-cream);
      color: var(--brand-red);
      border: 1px solid var(--brand-cream);
      border-radius: 4px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      min-width: 90px;
    }

    .btn-lens-cycle:active {
      transform: scale(0.95);
      background-color: #e2dfb3;
    }

    #status-msg {
      font-size: 0.75rem;
      color: var(--brand-cream);
      height: 18px;
      margin: 2px 0 0 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Simulated Screen Flash Overlay Animation */
    .flash-triggered {
      animation: hardwareFlashEffect 0.2s ease-out;
    }

    @keyframes hardwareFlashEffect {
      0% { opacity: 0; }
      15% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="top-dial-section">
      <span class="analog-meter">BATT: 100%</span>
      <span class="analog-meter" style="color: var(--status-green);">• ONLINE</span>
    </div>

    <!-- Camera Viewfinder with strict Portrait 2:3 boundaries -->
    <div class="viewfinder-wrapper">
      <video id="viewfinder" autoplay playsinline muted></video>
      <div id="flashOverlay"></div>
      <div class="viewfinder-overlay">
        <div class="grain-layer"></div>
        <div class="viewfinder-reticle"></div>
      </div>
    </div>

    <canvas id="captureCanvas" style="display:none;"></canvas>

    <!-- Bottom Mechanical Panel Layout -->
    <div class="control-panel">
      <div class="dashboard-row">
        <!-- Mechanical Counter -->
        <div class="counter-display">
          <span class="counter-label">INDEX</span>
          <span class="counter-value" id="counterDisplay">20</span>
        </div>

        <!-- Shutter Trigger -->
        <div class="shutter-wrapper">
          <button class="btn-shutter" id="snapBtn" aria-label="Mechanical Shutter Snap Button"></button>
          <div class="shutter-ring"></div>
        </div>

        <!-- Lens Select Selector -->
        <button class="btn-lens-cycle" id="cycleLensBtn">CYCLE LENS</button>
      </div>
      
      <p id="status-msg">LOADING SYSTEM...</p>
    </div>
  </div>

  <script>
    const MAX_SHOTS = 20;
    
    // REPLACE THIS URL WITH YOUR API DEPLOYMENT URL FROM PHASE 2
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxHE4NAhz0A5Yc4KXih0XrGmxxF_2YaKdzFuaOC4Azt-FFoeWTVmMuDbqds9-Xi_utjcQ/exec"; 

    let deviceId = localStorage.getItem('camera_device_uuid');
    if (!deviceId) {
      deviceId = 'device_' + Math.random().toString(36).substring(2, 15) + Date.now().toString(36);
      localStorage.setItem('camera_device_uuid', deviceId);
    }

    let shotsTaken = 0;
    let localStream = null;
    let videoDevices = [];
    let currentDeviceIndex = 0;
    const uploadQueue = [];
    let isUploading = false;

    const video = document.getElementById('viewfinder');
    const canvas = document.getElementById('captureCanvas');
    const context = canvas.getContext('2d');
    const counterDisplay = document.getElementById('counterDisplay');
    const snapBtn = document.getElementById('snapBtn');
    const cycleLensBtn = document.getElementById('cycleLensBtn');
    const statusMsg = document.getElementById('status-msg');
    const flashOverlay = document.getElementById('flashOverlay');

    // 1. RUNTIME SETUP & BACKGROUND ROLL SYNC
    async function syncRollStatus() {
      try {
        const response = await fetch(`${GAS_URL}?deviceId=${deviceId}`);
        const text = await response.text();
        shotsTaken = parseInt(text) || 0;
        
        updateUI();
        if (shotsTaken < MAX_SHOTS) {
          await initCamera();
        }
      } catch (err) {
        console.error(err);
        statusMsg.innerText = "SYNC FAILED. RE-SHUTTER.";
        // Fallback camera start even on network failure
        await initCamera();
      }
    }

    function updateUI() {
      const remaining = MAX_SHOTS - shotsTaken;
      counterDisplay.innerText = remaining;
      
      if (remaining <= 0) {
        snapBtn.disabled = true;
        statusMsg.innerText = "ROLL EMPTY. SHUTTER LOCKED.";
        if (localStream) {
          localStream.getTracks().forEach(track => track.stop());
        }
      } else {
        snapBtn.disabled = false;
        statusMsg.innerText = "READY";
      }
    }

    // 2. LENS CYCLING & HD CONFIGURATIONS
    async function initCamera() {
      try {
        await enumerateCameras();
        await startCameraWithIndex(currentDeviceIndex);
      } catch (err) {
        console.error(err);
        statusMsg.innerText = "LENS SELECTOR FAILURE.";
      }
    }

    async function enumerateCameras() {
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        videoDevices = devices.filter(d => d.kind === 'videoinput');
      } catch (err) {
        console.error("Camera index enumeration failure:", err);
      }
    }

    cycleLensBtn.addEventListener('click', async () => {
      if (videoDevices.length <= 1) {
        statusMsg.innerText = "SINGLE SYSTEM CAMERA ONLY";
        return;
      }
      currentDeviceIndex = (currentDeviceIndex + 1) % videoDevices.length;
      await startCameraWithIndex(currentDeviceIndex);
    });

    async function startCameraWithIndex(index) {
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
      }

      if (videoDevices.length === 0) {
        // Safe standard fallback constraints
        try {
          localStream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: { ideal: "environment" },
              width: { ideal: 3840 },
              height: { ideal: 2160 }
            },
            audio: false
          });
          video.srcObject = localStream;
        } catch (e) {
          statusMsg.innerText = "SYSTEM REJECTED CAMERA ACCESS";
        }
        return;
      }

      const device = videoDevices[index];
      const constraints = {
        video: {
          deviceId: { exact: device.deviceId },
          // Maximum Ultra HD stream allocation
          width: { ideal: 3840 },
          height: { ideal: 2160 }
        },
        audio: false
      };

      try {
        localStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = localStream;
        
        let label = device.label || `LENS ${index}`;
        // Map common cameras for aesthetic feedback
        if (label.toLowerCase().includes('back')) {
          label = label.toLowerCase().includes('wide') ? "0.5x ULTRA-WIDE LENS" : "1.0x MAIN LENS";
        } else if (label.toLowerCase().includes('front')) {
          label = "FRONT FACING PORTRAIT LENS";
        }
        statusMsg.innerText = label.toUpperCase();
      } catch (err) {
        console.warn("Retrying default facingMode constraints for index:", index, err);
        try {
          localStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: index % 2 === 0 ? "environment" : "user", width: { ideal: 3840 } },
            audio: false
          });
          video.srcObject = localStream;
          statusMsg.innerText = index % 2 === 0 ? "PRIMARY REAR LENS" : "FRONT FACING PORTRAIT LENS";
        } catch (e) {
          statusMsg.innerText = "SYSTEM REJECTED CAMERA ACCESS";
        }
      }
    }

    // 3. HARDWARE LED FLASH INTERFACE CONTROLS
    async function setHardwareTorch(on) {
      if (!localStream) return;
      const track = localStream.getVideoTracks()[0];
      if (track && typeof track.getCapabilities === 'function') {
        try {
          const caps = track.getCapabilities();
          if (caps.torch) {
            await track.applyConstraints({
              advanced: [{ torch: on }]
            });
          }
        } catch (e) {
          console.warn("Hardware led flash controls not available on this camera", e);
        }
      }
    }

    // 4. INSTANTANEOUS CAPTURE & ASYNC BACK-TO-BACK QUEUING
    snapBtn.addEventListener('click', async () => {
      if (shotsTaken >= MAX_SHOTS) return;

      // Lock shutter button momentarily during mechanics (~150ms delay total)
      snapBtn.disabled = true;

      // Increment counter immediately to block lag and lock out double clicks
      shotsTaken++;
      updateUI();

      // Trigger structural white screen flash overlay
      flashOverlay.classList.remove('flash-triggered');
      void flashOverlay.offsetWidth;
      flashOverlay.classList.add('flash-triggered');

      // Attempt physical hardware LED flash trigger
      await setHardwareTorch(true);

      // Lock current stream dimensions immediately to canvas
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      // --- CAPTURE 1: LOSS-LESS ULTRA HD RAW NEGATIVE ---
      context.filter = "none";
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      const rawImageDataUrl = canvas.toDataURL('image/jpeg', 1.0); // 1.0 = Lossless Ultra HD export Quality
      const rawBase64 = rawImageDataUrl.split(',')[1];

      // --- CAPTURE 2: LOSS-LESS PORTRA 400 EMULATED PRINT ---
      // Hardened Kodak Portra emulation values
      context.filter = "sepia(0.25) contrast(1.15) saturate(1.22) hue-rotate(-6deg) brightness(1.02)";
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      
      const filteredImageDataUrl = canvas.toDataURL('image/jpeg', 1.0); // Lossless quality
      const filteredBase64 = filteredImageDataUrl.split(',')[1];

      // De-active LED physical flash immediately after frame capture
      setTimeout(async () => {
        await setHardwareTorch(false);
      }, 100);

      // Release shutter block instantly within 150ms for rapid consecutive snaps!
      setTimeout(() => {
        if (shotsTaken < MAX_SHOTS) {
          snapBtn.disabled = false;
          statusMsg.innerText = "READY";
        }
      }, 150);

      // Queue payloads into non-blocking background network thread
      uploadQueue.push({
        filteredImage: filteredBase64,
        rawImage: rawBase64,
        deviceId: deviceId
      });

      // Fire off processor thread asynchronously
      processUploadQueue();
    });

    // 5. SECURE BACKGROUND UPLOAD CONTROLS
    function processUploadQueue() {
      if (isUploading || uploadQueue.length === 0) return;
      isUploading = true;

      const currentTask = uploadQueue[0];
      const itemsLeft = uploadQueue.length;
      statusMsg.innerText = `WINDING FILM... (${itemsLeft} IN COCKPIT)`;

      fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(currentTask)
      }).then(() => {
        uploadQueue.shift();
        isUploading = false;
        
        if (uploadQueue.length === 0) {
          statusMsg.innerText = shotsTaken >= MAX_SHOTS ? "ROLL EMPTY. SHUTTER LOCKED." : "READY";
        } else {
          // Process next background file
          processUploadQueue();
        }
      }).catch(err => {
        console.error("Transmission failed, retrying in 3 seconds...", err);
        isUploading = false;
        statusMsg.innerText = "UPLOADER DROPPED. RETRYING...";
        setTimeout(processUploadQueue, 3000); // Retry loop
      });
    }

    // Boot up
    syncRollStatus();
  </script>
</body>
</html>
